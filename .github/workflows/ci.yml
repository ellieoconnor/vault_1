name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint
        working-directory: apps/frontend

      - name: Check formatting
        run: npx prettier --check "apps/**/*.{ts,tsx,json}"

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/backend

      - name: Type check frontend
        run: npm run build --if-present
        working-directory: apps/frontend

      - name: Type check backend
        run: npx tsc --noEmit
        working-directory: apps/backend

  migrate:
    name: Run Migrations
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npx prisma migrate deploy
        working-directory: apps/backend

  migrate-staging:
    name: Run Staging Migrations
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    timeout-minutes: 10
    environment: staging
    concurrency:
      group: migrate-staging-develop
      cancel-in-progress: false
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Verify DATABASE_URL_STAGING is set
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "ERROR: DATABASE_URL_STAGING secret is not configured"
            exit 1
          fi

      - name: Run staging database migrations
        run: npx prisma migrate deploy
        working-directory: apps/backend
